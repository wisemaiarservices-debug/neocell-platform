name: NeoCell CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        working-directory: runtime
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Test
        working-directory: runtime
        run: pytest

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r runtime/requirements.txt
      - name: Start
        working-directory: runtime
        run: |
          python -m uvicorn app:app --host 127.0.0.1 --port 8300 > app.log 2>&1 &
      - name: Check
        run: |
          sleep 3
          curl -fsS http://127.0.0.1:8300/health
          curl -fsS http://127.0.0.1:8300/api/v1/dashboard/summary

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: apps/web
        run: pnpm install
      - name: Typecheck
        working-directory: apps/web
        run: pnpm run typecheck
      - name: Build
        working-directory: apps/web
        run: pnpm run build
